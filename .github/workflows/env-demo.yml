name: Environment Variables Demo

on:
  push:


env:
  GLOBAL_VAR: "I am a global variable"

jobs:
  demo:
    runs-on: ubuntu-latest


    env:
      JOB_VAR: "I am a job variable"

    steps:
      - name: Print Workflow & Job Variables
        run: echo "$GLOBAL_VAR | $JOB_VAR"

      - name: Step with its own env
        # ⚙️ Step-level env
        env:
          STEP_VAR: "I am a step variable"
        run: echo "$GLOBAL_VAR | $JOB_VAR | $STEP_VAR"